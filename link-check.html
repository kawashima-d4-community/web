<html lang="ja">

  <title>リンク確認｜川島第四町内会</title>

  <link rel="icon" type="image/png" href="./d4-mark2.png" />
  <style>
    :root { --bg:#fff8f6; --paper:#fff; --ink:#321d16; --muted:#7b5d52; --primary:#d9684f; --primary-dark:#9f4c3c; --accent:#f2a65a; --border:#eed8c9; --shadow:0 18px 45px rgba(159,76,60,.11); --max:1120px; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:linear-gradient(180deg,#fff5ee 0%,var(--bg) 48%,#fff 100%); line-height:1.7; }
    a { color:inherit; }
    .container { width:min(var(--max), calc(100% - 32px)); margin:0 auto; }
    header { background:rgba(255,255,255,.92); border-bottom:1px solid var(--border); }
    .nav { min-height:68px; display:flex; align-items:center; justify-content:space-between; gap:14px; }
    .brand { display:flex; align-items:center; gap:10px; font-weight:1000; text-decoration:none; }
    .brand-mark { width:42px; height:42px; border-radius:12px; display:grid; place-items:center; background:#fff; border:1px solid var(--border); padding:4px; }
    .brand-mark img { width:100%; height:100%; object-fit:contain; }
    .button { display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:40px; padding:9px 14px; border-radius:999px; border:1px solid var(--border); background:#fff; color:var(--primary-dark); font-weight:1000; font-size:13px; text-decoration:none; cursor:pointer; }
    .button.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
    .hero, .panel { margin:18px 0; padding:20px; border-radius:24px; background:#fff; border:1px solid var(--border); box-shadow:0 10px 26px rgba(127,29,29,.055); }
    .badge { display:inline-flex; border-radius:999px; padding:5px 10px; background:#fff4ee; color:var(--primary-dark); font-size:12px; font-weight:900; }
    h1 { margin:12px 0 8px; font-size:clamp(28px,5vw,42px); line-height:1.18; }
    h2 { margin:0 0 10px; color:var(--primary-dark); font-size:22px; }
    p { color:var(--muted); font-weight:800; }
    .summary { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin:14px 0; }
    .summary div { padding:12px; border-radius:18px; background:#fff8f6; border:1px solid var(--border); }
    .summary span { display:block; color:var(--muted); font-size:12px; font-weight:900; }
    .summary strong { color:var(--primary-dark); font-size:24px; }
    .tools { display:flex; flex-wrap:wrap; gap:10px; margin:12px 0; }
    .table-wrap { overflow:auto; }
    table { width:100%; border-collapse:separate; border-spacing:0 7px; }
    th { text-align:left; color:var(--muted); font-size:12px; padding:0 10px; white-space:nowrap; }
    td { padding:10px; background:#fff8f6; border-top:1px solid rgba(238,216,201,.86); border-bottom:1px solid rgba(238,216,201,.86); font-size:13px; font-weight:900; vertical-align:top; }
    td:first-child { border-left:1px solid rgba(238,216,201,.86); border-radius:14px 0 0 14px; }
    td:last-child { border-right:1px solid rgba(238,216,201,.86); border-radius:0 14px 14px 0; }
    .url { word-break:break-all; color:var(--primary-dark); }
    .status { display:inline-flex; border-radius:999px; padding:3px 8px; background:#fff; border:1px solid var(--border); font-size:12px; font-weight:1000; white-space:nowrap; }
    .ok { color:#146c43; }
    .ng { color:#b02a37; }
    .manual { color:#7b5d52; }
    .note { padding:12px 14px; border-radius:18px; background:#fff7e8; border:1px solid rgba(242,166,90,.45); color:var(--muted); font-size:13px; font-weight:800; }
    footer { padding:28px 0; color:var(--muted); font-size:13px; font-weight:800; }
    @media(max-width:900px) { .summary { grid-template-columns:1fr 1fr; } .nav { align-items:flex-start; flex-direction:column; padding:10px 0; } }
    @media(max-width:560px) { .summary { grid-template-columns:1fr; } .button { width:100%; } }
  </style>
</head>

  <header>
    <div class="container nav">
      <a class="brand" href="./add.html"><span class="brand-mark"><img src="./d4-mark2.png" alt="川島第四町内会ロゴ" /></span><span>リンク確認</span></a>
      <a class="button" href="./add.html">管理者用ダッシュボードへ戻る</a>
    </div>
  </header>
  <main class="container">
    <section class="hero">
      <span class="badge">Admin Link Check</span>
      <h1>リンク確認</h1>
      <p>サイト内リンク、資料リンク、外部リンクの一覧です。サイト内リンクはこの画面から簡易確認できます。</p>
      <div class="note">Googleドライブや外部サイトは、ブラウザの制限により自動判定できない場合があります。その場合は「開いて確認」してください。</div>
      <div class="summary">
        <div><span>リンク総数</span><strong id="sumAll">0</strong></div>
        <div><span>サイト内リンク</span><strong id="sumInternal">0</strong></div>
        <div><span>外部・資料リンク</span><strong id="sumExternal">0</strong></div>
        <div><span>要確認</span><strong id="sumNeedCheck">0</strong></div>
      </div>
      <div class="tools">
        <button class="button primary" type="button" onclick="checkInternalLinks()">サイト内リンクを確認</button>
        <button class="button" type="button" onclick="filterLinks('all')">すべて</button>
        <button class="button" type="button" onclick="filterLinks('internal')">サイト内のみ</button>
        <button class="button" type="button" onclick="filterLinks('external')">外部・資料のみ</button>
      </div>
    </section>
    <section class="panel">
      <h2>リンク一覧</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>状態</th><th>種類</th><th>掲載ページ</th><th>リンク</th><th>確認</th></tr>
          </thead>
          <tbody id="linkTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <footer>
    <div class="container">© 川島第四町内会　最終更新日：<time datetime="2026-06-11">2026-06-11</time></div>

      const rows = D4_LINK_CHECK_ITEMS.filter(item => {
        if (filter === 'internal') return item.kind === '内部';
        if (filter === 'external') return item.kind === '外部';

      });
      tbody.innerHTML = rows.map((item, index) => `
        <tr data-kind="${item.kind}" data-url="${item.url}">
          <td><span class="status manual" id="status-${index}">${item.kind === '内部' ? '未確認' : '手動確認'}</span></td>
          <td>${item.label}<br><small>${item.kind}</small></td>
          <td>${item.sourceTitle}<br><small>${item.source}</small></td>
          <td class="url">${item.url}</td>
          <td><a class="button" href="${item.url}" target="_blank" rel="noopener">開いて確認</a></td>
        </tr>
      `).join('');
      updateSummary();
    }

    function filterLinks(filter) { renderLinks(filter); }

    function updateSummary() {
      const all = D4_LINK_CHECK_ITEMS.length;
      const internal = D4_LINK_CHECK_ITEMS.filter(x => x.kind === '内部').length;
      const external = all - internal;
      document.getElementById('sumAll').textContent = all.toLocaleString();
      document.getElementById('sumInternal').textContent = internal.toLocaleString();
      document.getElementById('sumExternal').textContent = external.toLocaleString();
      document.getElementById('sumNeedCheck').textContent = external.toLocaleString();
    }

    async function checkInternalLinks() {
      const rows = Array.from(document.querySelectorAll('#linkTableBody tr[data-kind="内部"]'));
      for (const row of rows) {
        const status = row.querySelector('.status');
        const url = normalizeInternalUrl(row.dataset.url);
        status.textContent = '確認中';
        status.className = 'status manual';
        try {
          const res = await fetch(url, { method: 'HEAD', cache: 'no-store' });
          if (res.ok) {
            status.textContent = 'OK';
            status.className = 'status ok';
          } else {
            status.textContent = '要確認';
            status.className = 'status ng';
          }
        } catch (e) {
          try {
            const res2 = await fetch(url, { method: 'GET', cache: 'no-store' });
            status.textContent = res2.ok ? 'OK' : '要確認';
            status.className = res2.ok ? 'status ok' : 'status ng';
          } catch (e2) {
            status.textContent = '要確認';
            status.className = 'status ng';
          }
        }
      }
    }

    renderLinks('all');
  </script>
</body>
</html>
