<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <meta name="last-modified" content="2026-06-11" />
  <meta name="d4-site-version" content="2026-06-11" />
  <title>ページが見つかりません｜川島第四町内会</title>
  <meta name="description" content="川島第四町内会ホームページのページが見つからない場合の案内ページです。" />
  <link rel="icon" type="image/png" href="./d4-mark2.png" />
  <style>
    :root { --bg:#fff8f6; --paper:#fff; --ink:#321d16; --muted:#7b5d52; --primary:#d9684f; --primary-dark:#9f4c3c; --accent:#f2a65a; --border:#eed8c9; --shadow:0 18px 45px rgba(159,76,60,.12); --max:980px; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:linear-gradient(180deg,#fff5ee 0%,var(--bg) 58%,#fff 100%); line-height:1.75; }
    a { color:inherit; text-decoration:none; }
    .container { width:min(var(--max), calc(100% - 32px)); margin:0 auto; }
    header { background:rgba(255,255,255,.92); border-bottom:1px solid var(--border); }
    .nav { min-height:68px; display:flex; align-items:center; justify-content:space-between; gap:14px; }
    .brand { display:flex; align-items:center; gap:10px; font-weight:1000; }
    .brand-mark { width:42px; height:42px; border-radius:12px; display:grid; place-items:center; background:#fff; border:1px solid var(--border); padding:4px; }
    .brand-mark img { width:100%; height:100%; object-fit:contain; display:block; }
    .card { margin:38px 0 28px; padding:30px; border-radius:30px; background:#fff; border:1px solid var(--border); box-shadow:var(--shadow); }
    .badge { display:inline-flex; border-radius:999px; padding:5px 10px; background:#fff4ee; color:var(--primary-dark); font-size:12px; font-weight:900; }
    h1 { margin:14px 0 8px; font-size:clamp(30px,5vw,46px); line-height:1.18; }
    h2 { margin:28px 0 10px; color:var(--primary-dark); font-size:22px; }
    p, li { color:var(--muted); font-weight:800; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
    .button { display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:44px; padding:10px 16px; border-radius:999px; border:1px solid var(--border); background:#fff; color:var(--primary-dark); font-weight:1000; }
    .button.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
    .note { margin-top:18px; padding:14px; border-radius:18px; background:#fff7e8; border:1px solid rgba(242,166,90,.45); color:var(--muted); font-size:13px; font-weight:800; }
    footer { padding:28px 0; color:var(--muted); font-size:13px; font-weight:800; }
    @media (max-width:640px) { .nav { align-items:flex-start; flex-direction:column; padding:10px 0; } .button { width:100%; } .card { padding:20px; border-radius:24px; } }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a class="brand" href="./index.html"><span class="brand-mark"><img src="./d4-mark2.png" alt="川島第四町内会ロゴ" /></span><span>川島第四町内会</span></a>
      <a class="button" href="./index.html">トップページへ戻る</a>
    </div>
  </header>
  <main class="container">
    <section class="card">
      <span class="badge">404 Not Found</span>
      <h1>ページが見つかりません</h1>
      <p>お探しのページは、移動・削除されたか、URLが変更された可能性があります。</p>
      <div class="actions">
        <a class="button primary" href="./index.html">トップページへ戻る</a>
        <a class="button" href="./search.html">サイト内検索を使う</a>
        <a class="button" href="./sitemap.html">サイトマップを見る</a>
        <a class="button" href="./contact.html">お問い合わせ</a>
      </div>
      <h2>資料リンクが開けない場合</h2>
      <p>Googleドライブの資料が開けない場合は、スマートフォンの通信状況やGoogleドライブ側の共有設定により表示できないことがあります。時間をおいて再度お試しください。</p>
      <div class="note">リンク切れや表示不具合にお気づきの場合は、お問い合わせページからご連絡ください。</div>
    </section>
  </main>
  <footer>
    <div class="container">© 川島第四町内会　最終更新日：<time datetime="2026-06-11">2026-06-11</time></div>
  </footer>
</body>
</html>
